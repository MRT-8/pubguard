<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="'SF Mono','Cascadia Code','Fira Code',Menlo,Monaco,'Courier New',monospace" font-size="13">
  <style>
    .term-bg { fill: #1e1e2e; rx: 10; ry: 10; }
    .title-bar { fill: #313244; }
    .dot-r { fill: #f38ba8; }
    .dot-y { fill: #f9e2af; }
    .dot-g { fill: #a6e3a1; }
    .prompt { fill: #a6adc8; }
    .cmd { fill: #cdd6f4; }
    .bold { fill: #cdd6f4; font-weight: bold; }
    .dim { fill: #6c7086; }
    .red { fill: #f38ba8; }
    .yellow { fill: #f9e2af; }
    .green { fill: #a6e3a1; }
    .red-bold { fill: #f38ba8; font-weight: bold; }
    .title-text { fill: #bac2de; font-size: 12px; }
  </style>

  <!-- Terminal window -->
  <rect class="term-bg" width="640" height="420"/>

  <!-- Title bar -->
  <rect class="title-bar" width="640" height="36" rx="10" ry="10"/>
  <rect class="title-bar" width="640" height="16" y="20"/>

  <!-- Traffic lights -->
  <circle class="dot-r" cx="20" cy="18" r="6"/>
  <circle class="dot-y" cx="40" cy="18" r="6"/>
  <circle class="dot-g" cx="60" cy="18" r="6"/>

  <!-- Title bar text -->
  <text class="title-text" x="320" y="22" text-anchor="middle">pubguard</text>

  <!-- Frame 1: Command input -->
  <g opacity="0">
    <text class="prompt" x="20" y="68">$</text>
    <text class="cmd" x="36" y="68">pubguard check leaky-app.tgz --strict</text>
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Frame 2: Header -->
  <g opacity="0">
    <text class="bold" x="20" y="102">PubGuard</text>
    <text class="dim" x="88" y="102">scan results</text>
    <text class="dim" x="20" y="120">4 files, 956 B</text>
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Frame 3: Error 1 - sourcemap -->
  <g opacity="0">
    <text class="red" x="24" y="154">x</text>
    <text class="cmd" x="44" y="154">Source map "dist/cli.js.map" contains sourcesContent</text>
    <text class="dim" x="44" y="172">fix: Add "*.map" to .npmignore</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Frame 4: Error 2 - system prompt -->
  <g opacity="0">
    <text class="red" x="24" y="202">x</text>
    <text class="cmd" x="44" y="202">AI system prompt detected in "dist/index.js"</text>
    <text class="dim" x="44" y="220">fix: Move prompts to env vars or private config</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Frame 5: Error 3 - .env -->
  <g opacity="0">
    <text class="red" x="24" y="250">x</text>
    <text class="cmd" x="44" y="250">Sensitive file ".env" detected</text>
    <text class="dim" x="44" y="268">fix: Add ".env" to .npmignore</text>
    <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Frame 6: Warning - sourceMappingURL -->
  <g opacity="0">
    <text class="yellow" x="24" y="298">!</text>
    <text class="cmd" x="44" y="298">sourceMappingURL reference found in "dist/index.js"</text>
    <text class="dim" x="44" y="316">fix: Remove sourceMappingURL for production builds</text>
    <animate attributeName="opacity" from="0" to="1" begin="4.4s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Frame 7: Divider + Summary -->
  <g opacity="0">
    <text class="dim" x="20" y="346">---</text>
    <text class="red" x="24" y="366">3 error(s)</text>
    <text class="yellow" x="120" y="366">1 warning(s)</text>
    <animate attributeName="opacity" from="0" to="1" begin="5.2s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Frame 8: Publish blocked -->
  <g opacity="0">
    <text class="red-bold" x="24" y="398">Publish blocked</text>
    <text class="red" x="160" y="398">-- fix errors above before publishing</text>
    <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.5s" fill="freeze"/>
  </g>
</svg>
