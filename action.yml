name: 'pubguard'
description: 'Scan npm packages for sensitive content before publishing'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  strict:
    description: 'Exit with code 1 on any error-level finding'
    required: false
    default: 'true'
  format:
    description: 'Output format: text, json, or sarif'
    required: false
    default: 'text'
  config:
    description: 'Path to config file'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Run pubguard
      shell: bash
      run: |
        ARGS="check --dry-run"
        if [ "${{ inputs.strict }}" = "true" ]; then
          ARGS="$ARGS --strict"
        fi
        if [ -n "${{ inputs.format }}" ] && [ "${{ inputs.format }}" != "text" ]; then
          ARGS="$ARGS --format ${{ inputs.format }}"
        fi
        if [ -n "${{ inputs.config }}" ]; then
          ARGS="$ARGS --config ${{ inputs.config }}"
        fi
        npx pubguard@latest $ARGS
